<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clearing Service Workers...</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            padding: 3rem;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            max-width: 500px;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 2rem auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .success {
            color: #4ade80;
            font-size: 3rem;
            margin-bottom: 1rem;
        }
        button {
            background: white;
            color: #667eea;
            border: none;
            padding: 1rem 2rem;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 1rem;
        }
        button:hover {
            transform: scale(1.05);
        }
        #log {
            text-align: left;
            background: rgba(0, 0, 0, 0.3);
            padding: 1rem;
            border-radius: 10px;
            margin-top: 1rem;
            font-family: monospace;
            font-size: 0.85rem;
            max-height: 300px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔧 Service Worker Cleanup</h1>
        <div id="status">
            <div class="spinner"></div>
            <p>Unregistering old service workers...</p>
        </div>
        <div id="log"></div>
    </div>

    <script>
        const log = document.getElementById('log');
        const status = document.getElementById('status');

        function addLog(message) {
            const time = new Date().toLocaleTimeString();
            log.innerHTML += `[${time}] ${message}<br>`;
            log.scrollTop = log.scrollHeight;
            console.log(message);
        }

        async function clearEverything() {
            let swCount = 0;
            let cacheCount = 0;

            try {
                // 1. Unregister ALL service workers
                addLog('🔍 Checking for service workers...');
                if ('serviceWorker' in navigator) {
                    const registrations = await navigator.serviceWorker.getRegistrations();
                    addLog(`Found ${registrations.length} service worker(s)`);
                    
                    for (let registration of registrations) {
                        addLog(`Unregistering: ${registration.scope}`);
                        await registration.unregister();
                        swCount++;
                    }
                    addLog(`✅ Unregistered ${swCount} service worker(s)`);
                } else {
                    addLog('ℹ️ Service workers not supported');
                }

                // 2. Clear ALL caches
                addLog('🗑️ Clearing cache storage...');
                if ('caches' in window) {
                    const cacheNames = await caches.keys();
                    addLog(`Found ${cacheNames.length} cache(s): ${cacheNames.join(', ')}`);
                    
                    for (let cacheName of cacheNames) {
                        await caches.delete(cacheName);
                        cacheCount++;
                    }
                    addLog(`✅ Deleted ${cacheCount} cache(s)`);
                } else {
                    addLog('ℹ️ Cache API not supported');
                }

                // 3. Clear localStorage
                addLog('🗑️ Clearing localStorage...');
                localStorage.clear();
                addLog('✅ localStorage cleared');

                // 4. Clear sessionStorage
                addLog('🗑️ Clearing sessionStorage...');
                sessionStorage.clear();
                addLog('✅ sessionStorage cleared');

                // 5. Clear IndexedDB
                addLog('🗑️ Clearing IndexedDB...');
                if ('indexedDB' in window) {
                    const dbs = await indexedDB.databases();
                    for (let db of dbs) {
                        if (db.name) {
                            indexedDB.deleteDatabase(db.name);
                            addLog(`Deleted IndexedDB: ${db.name}`);
                        }
                    }
                }

                // Success
                status.innerHTML = `
                    <div class="success">✅</div>
                    <h2>Cleanup Complete!</h2>
                    <p>Unregistered ${swCount} service worker(s)</p>
                    <p>Deleted ${cacheCount} cache(s)</p>
                    <button onclick="window.location.href='/dashboard'">
                        Return to Dashboard
                    </button>
                `;

            } catch (error) {
                addLog(`❌ Error: ${error.message}`);
                status.innerHTML += `<p style="color: #f87171;">Error: ${error.message}</p>`;
            }
        }

        // Start cleanup immediately
        clearEverything();

        // Force reload after 3 seconds
        setTimeout(() => {
            addLog('🔄 Redirecting to dashboard...');
            window.location.href = '/dashboard';
        }, 3000);
    </script>
</body>
</html>
